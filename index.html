<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Weather App</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="apple-touch-icon" href="images/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/lux/bootstrap.min.css" integrity="sha384-9+PGKSqjRdkeAU7Eu4nkJU8RFaH8ace8HGXnkiKMP9I9Te0GJ4/km3L1Z8tXigpG" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark">
    <!-- current weather card -->
    <div class="container mt-5">
        <div class="card mx-auto text-center shadow">
            <div class="card-body">
                <h5 class="card-title opacity-75"><i class="bi bi-geo-alt-fill text-success"></i> Cookeville, TN</h5>
                <div class="display-1 my-3">
                    <i id="txtWeatherIcon" class="bi"></i>
                </div>
                <h2 class="display-4 fw-bold" id="txtCurrentTemp"><i class="bi bi-thermometer-half text-warning"></i> --°F</h2>
                <p class="card-text text-secondary" id="txtCurrentHumidity"><i class="bi bi-droplet-half"></i> Humidity: --%</p>
                <p class="text-secondary small" id="txtLastUpdated"><i class="bi bi-clock-fill text-primary"></i> Last updated: --:--</p>
                <button class="btn btn-primary w-100" id="btnRefresh">Refresh Weather</button>
            </div>
        </div>
    </div>
    
    <!-- hourly forecast card -->
     <div class="container-fluid mt-3">
        <div id="divHourlyForecast" class="">
            <div class="row align-items-start">
                <div class="card-body">
                    <div class="col">
                    Hourly weather
                    </div>
                </div>
            </div>
        </div>
     </div>
    
    <!-- forecast card -->
    <div class="container mt-4 mb-4">
        <div id="divForecastRow" class="row g-2 text-center">

        </div>
    </div>

    <!-- footer -->
     <footer class="footer mt-auto py-4">
        <div class="container text-center">
            <span class="text-muted small">
                Data provided by <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
            </span>
        </div>
     </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
