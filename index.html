<!DOCTYPE html>
<html lang="en">
<head>
   <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Weather App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    </head>
</head>
<body>
    <!-- current weather card -->
    <div class="container mt-5">
        <div class="card mx-auto text-center shadow">
            <div class="card-body">
                <h5 class="card-title text-muted">Cookeville, TN</h5>
                <div class="display-1 my-3">
                    <i id="txtWeatherIcon" class="bi"></i>
                </div>
                <h2 class="display-4 fw-bold" id="txtCurrentTemp">--°F</h2>
                <p class="card-text text-secondary" id="txtCurrentHumidity">Humidity: --%</p>
                
                <button class="btn btn-primary w-100" id="btnRefresh">Refresh Weather</button>
            </div>
        </div>
    </div>
    
    <!-- forecast card -->
    <div class="container mt-4">
        <div id="forecastRow" class="row g-2 text-center">
            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
